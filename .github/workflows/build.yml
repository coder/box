# Build CI — builds the installer ISO for every supported architecture.
#
# Each arch is built on a native runner inside the official `nixos/nix`
# container, so `make installer/iso` (no arch suffix) resolves to the runner's
# native `builtins.currentSystem` (x86_64-linux or aarch64-linux). The Makefile
# drops a GC-root symlink at:
#
#   out/installer-iso/iso/coder-box-installer-<arch>-linux.iso
#
# This is a verification build: it proves both ISOs still build. The artifacts
# are uploaded for inspection but are short-lived; cutting an actual release is
# the release.yml workflow's job.

name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid PR pushes); a full ISO
# build is expensive so don't waste runners on stale commits.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installer-iso:
    name: installer/iso (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    container:
      image: nixos/nix:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-24.04
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    env:
      # The Makefile builds via `nix build --impure` and needs flakes +
      # nix-command enabled; the nixos/nix image ships neither on by default.
      NIX_CONFIG: |
        experimental-features = nix-command flakes
        accept-flake-config = true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build installer ISO
        # gnumake provides `make`; git lets the Makefile stamp the build rev.
        run: nix-shell -p gnumake git --run "make installer/iso"

      - name: Stage ISO
        id: iso
        run: |
          mkdir -p dist
          src="out/installer-iso/iso/coder-box-installer-${{ matrix.system }}.iso"
          if [ ! -f "$src" ]; then
            echo "Expected ISO not found at $src" >&2
            ls -lR out/ >&2 || true
            exit 1
          fi
          cp -L "$src" "dist/coder-box-installer-${{ matrix.system }}.iso"
          ls -lh dist/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: coder-box-installer-${{ matrix.system }}
          path: dist/coder-box-installer-${{ matrix.system }}.iso
          # Verification build; keep storage cost low.
          retention-days: 7
          if-no-files-found: error
