# Build ISO — builds the installer AND appliance ISOs for every supported
# architecture.
#
# Each arch builds on a native runner; the build itself runs inside the
# official `nixos/nix` container via `docker run`. We deliberately do NOT put
# the whole job in `container:` — the nixos/nix image lacks a standard glibc
# loader, so GitHub's bundled Node can't run there and every JS action
# (checkout, upload-artifact) fails with `exec .../node: no such file or
# directory`. So checkout/upload run on the host runner and only `make` runs in
# the container.
#
# `make <kind>/iso` resolves to the runner's native `builtins.currentSystem`
# (x86_64-linux or aarch64-linux) and produces
# out/<kind>-iso/iso/coder-box-<kind>-<arch>-linux.iso (+ a .sha256 sidecar)
# inside the container. The container /nix/store is ephemeral, so we dereference
# the ISO into a host /dist volume and upload from there.
#
# Triggers / what gets built:
#   * push to main, workflow_dispatch  → always build the full ISO.
#   * pull_request (ready, non-draft)  → a per-step `if:` on the kind's label
#       decides: with test-installer-iso / test-appliance-iso applied, realise
#       the full ISO; without it, just instantiate the .drv (cheap validation,
#       no image). The `labeled` trigger means adding the label kicks off the
#       full build.
# Verification artifacts are short-lived (1 day).

name: Build ISO

on:
  push:
    branches: [main]
  pull_request:
    # `opened`/`reopened` cover a PR created/reopened already non-draft,
    # `ready_for_review` a draft promoted to ready, and `labeled` so applying a
    # test-*-iso label starts the full build. Notably absent is `synchronize`,
    # so pushing new commits does NOT rebuild (eval.yml covers per-commit drv).
    types: [opened, reopened, ready_for_review, labeled]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref/commit to build (defaults to the selected branch)"
        required: false
        type: string

# Cancel superseded runs on the same ref; a full ISO build is expensive so
# don't waste runners on stale commits.
concurrency:
  group: build-${{ github.ref }}-${{ github.event.inputs.ref }}
  cancel-in-progress: true

jobs:
  iso:
    name: ${{ matrix.kind }} (${{ matrix.system }})
    # Skip draft PRs (opened/reopened/labeled fire for drafts too); always run
    # for push and manual dispatch.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ${{ matrix.runner }}
    env:
      # full = realise the ISO; drv-only otherwise. Non-PR events (push, manual
      # dispatch) always build the full ISO; a PR builds a kind's full ISO only
      # when its label (test-installer-iso / test-appliance-iso) is applied.
      # Step `if:`s below branch on this.
      FULL: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, matrix.label) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - kind: Installer
            target: installer
            label: test-installer-iso
            system: x86_64-linux
            runner: ubuntu-24.04
          - kind: Installer
            target: installer
            label: test-installer-iso
            system: aarch64-linux
            runner: ubuntu-24.04-arm
          - kind: Appliance
            target: appliance
            label: test-appliance-iso
            system: x86_64-linux
            runner: ubuntu-24.04
          - kind: Appliance
            target: appliance
            label: test-appliance-iso
            system: aarch64-linux
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Empty for push/PR (checks out the event ref); honored for manual
          # dispatch to build an arbitrary commit.
          ref: ${{ github.event.inputs.ref }}

      - name: Instantiate ISO derivation
        # No label on a PR: just evaluate the .drv (cheap validation, no image).
        if: env.FULL != 'true'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          docker run --rm \
            -v "$PWD":/work -w /work \
            -e TARGET \
            nixos/nix:latest \
            sh -euc '
              export NIX_CONFIG="experimental-features = nix-command flakes"
              git config --global --add safe.directory /work
              nix-shell -p gnumake git --run "make $TARGET/drv"
            '

      - name: Build full ISO
        # Label present (or non-PR event): realise the full image.
        if: env.FULL == 'true'
        id: build
        env:
          TARGET: ${{ matrix.target }}
        run: |
          # Host /dist volume, bind-mounted into the container, where the build
          # drops the finished ISO + checksum (the container's /nix/store is
          # ephemeral, so the in-tree out/ symlink would dangle on the host).
          dist="$(mktemp -d)"
          echo "dist=$dist" >>"$GITHUB_OUTPUT"
          outlink="out/$TARGET-iso/iso"
          docker run --rm \
            -v "$PWD":/work -w /work \
            -v "$dist":/dist \
            -e TARGET -e outlink="$outlink" \
            nixos/nix:latest \
            sh -euc '
              # The Makefile builds via "nix build --impure" and needs flakes +
              # nix-command, which the nixos/nix image does not enable by default.
              export NIX_CONFIG="experimental-features = nix-command flakes"
              # Repo is bind-mounted and owned by a different uid; allow git to
              # read it so the Makefile can stamp the build rev.
              git config --global --add safe.directory /work
              # gnumake provides "make"; git lets the Makefile stamp the rev. The
              # ISO targets also emit out/<name>.iso.sha256 sidecar checksums.
              # Bare target → native currentSystem (matrix pins the runner arch).
              nix-shell -p gnumake git --run "make $TARGET/iso"
              # Dereference the build store symlink (+ checksum sidecar) into the
              # /dist volume for upload.
              cp -L "$outlink"/*.iso /dist/
              cp out/*.iso.sha256 /dist/
            '
          ls -lh "$dist"

      - name: Upload ISO artifact
        # drv-only runs produce no image, so nothing to upload.
        if: env.FULL == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: coder-box-${{ matrix.target }}-${{ matrix.system }}
          path: ${{ steps.build.outputs.dist }}/*.iso
          # Verification build; keep storage cost minimal.
          retention-days: 1
          if-no-files-found: error

      - name: Upload ISO checksum artifact
        if: env.FULL == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: coder-box-${{ matrix.target }}-${{ matrix.system }}-sha256
          path: ${{ steps.build.outputs.dist }}/*.iso.sha256
          retention-days: 1
          if-no-files-found: error
