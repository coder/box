# Build CI — builds the installer ISO for every supported architecture.
#
# Each arch builds on a native runner; the build itself runs inside the
# official `nixos/nix` container via `docker run`. We deliberately do NOT put
# the whole job in `container:` — the nixos/nix image lacks a standard glibc
# loader, so GitHub's bundled Node can't run there and every JS action
# (checkout, upload-artifact) fails with `exec .../node: no such file or
# directory`. So checkout/upload run on the host runner and only `make` runs in
# the container.
#
# Bare `make installer/iso` resolves to the runner's native
# `builtins.currentSystem` (x86_64-linux or aarch64-linux) and produces
# out/installer-iso/iso/coder-box-installer-<arch>-linux.iso inside the
# container; we copy it into the mounted workspace (dist/) because the
# container's /nix/store does not persist on the host after it exits.
#
# This is a verification build: it proves both ISOs still build. The artifacts
# are uploaded for inspection but are short-lived; cutting an actual release is
# the release.yml workflow's job.

name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid PR pushes); a full ISO
# build is expensive so don't waste runners on stale commits.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installer-iso:
    name: installer/iso (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-24.04
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build installer ISO (in nixos/nix container)
        env:
          SYSTEM: ${{ matrix.system }}
        run: |
          docker run --rm \
            -v "$PWD":/work -w /work \
            -e SYSTEM \
            nixos/nix:latest \
            sh -euc '
              # The Makefile builds via `nix build --impure` and needs flakes +
              # nix-command, which the nixos/nix image does not enable by default.
              export NIX_CONFIG="experimental-features = nix-command flakes"
              # Repo is bind-mounted and owned by a different uid; allow git to
              # read it so the Makefile can stamp the build rev.
              git config --global --add safe.directory /work
              # gnumake provides `make`; git lets the Makefile stamp the rev.
              nix-shell -p gnumake git --run "make installer/iso"
              # Copy the ISO out of the (ephemeral) container /nix/store into the
              # mounted workspace so the host can upload it.
              mkdir -p dist
              cp -L "out/installer-iso/iso/coder-box-installer-$SYSTEM.iso" \
                "dist/coder-box-installer-$SYSTEM.iso"
            '
          ls -lh dist/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: coder-box-installer-${{ matrix.system }}
          path: dist/coder-box-installer-${{ matrix.system }}.iso
          # Verification build; keep storage cost low.
          retention-days: 7
          if-no-files-found: error
