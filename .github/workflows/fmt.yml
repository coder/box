# Formatting & linting — verifies the tree is already formatted and lint-clean.
# Formatting and linting are CHECKED here, never applied: CI only fails (with a
# diff) when something is off — fixing it is `make fmt` locally.
#
# Two independent jobs run separate tool sets (treefmt config in ../../treefmt.nix):
#   * format → `make fmt/check`: nixfmt + shfmt, check-only (no writes).
#   * lint   → `make lint`:      statix + deadnix + shellcheck, check-only.
# Splitting them means a formatting miss and a lint finding show up as distinct,
# independently-rerunnable checks.
#
# Like the other workflows (see test.yml), the actual Nix command runs inside
# the `nixos/nix` container via `docker run` — that image lacks a glibc loader
# for GitHub's bundled Node, so JS actions (checkout) stay on the host runner
# and only `nix` runs in the container. gnumake provides `make`; git lets the
# flake resolve the bind-mounted (foreign-uid) tree.

name: Format & lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: fmt-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format check (nixfmt, shfmt)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: make fmt/check
        run: |
          docker run --rm \
            -v "$PWD":/work -w /work \
            nixos/nix:latest \
            sh -euc '
              export NIX_CONFIG="experimental-features = nix-command flakes"
              git config --global --add safe.directory /work
              # Check-only (`--ci`): fails with a diff if anything is unformatted.
              # Does NOT modify the tree — run `make fmt` locally to fix.
              nix-shell -p gnumake git --run "make fmt/check"
            '

  lint:
    name: Lint (statix, deadnix, shellcheck)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: make lint
        run: |
          docker run --rm \
            -v "$PWD":/work -w /work \
            nixos/nix:latest \
            sh -euc '
              export NIX_CONFIG="experimental-features = nix-command flakes"
              git config --global --add safe.directory /work
              # Check-only (`--ci`): fails with a diff (statix/deadnix) or
              # findings (shellcheck). Does NOT modify the tree.
              nix-shell -p gnumake git --run "make lint"
            '
