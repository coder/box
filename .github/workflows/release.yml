# Release — builds the installer ISO for every supported architecture and
# publishes them as assets on a GitHub Release.
#
# Trigger either way:
#   * push a tag matching v*  (e.g. `git tag v1.2.0 && git push origin v1.2.0`)
#   * run manually from the Actions tab (workflow_dispatch) and supply a tag.
#
# Each arch builds on a native runner inside the `nixos/nix` container, so
# `make installer/iso` resolves to the runner's native `builtins.currentSystem`
# and produces out/installer-iso/iso/coder-box-installer-<arch>-linux.iso. The
# release job then gathers both ISOs and attaches them to the release.

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/publish (e.g. v1.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark the release as a pre-release"
        required: false
        default: false
        type: boolean

# Only one release run per tag at a time.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: installer/iso (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    container:
      image: nixos/nix:latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-24.04
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    env:
      NIX_CONFIG: |
        experimental-features = nix-command flakes
        accept-flake-config = true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build installer ISO
        # gnumake provides `make`; git lets the Makefile stamp the build rev.
        run: nix-shell -p gnumake git --run "make installer/iso"

      - name: Stage ISO for upload
        run: |
          mkdir -p dist
          src="out/installer-iso/iso/coder-box-installer-${{ matrix.system }}.iso"
          if [ ! -f "$src" ]; then
            echo "Expected ISO not found at $src" >&2
            ls -lR out/ >&2 || true
            exit 1
          fi
          cp -L "$src" "dist/coder-box-installer-${{ matrix.system }}.iso"
          # Checksum so release consumers can verify the download.
          (cd dist && sha256sum "coder-box-installer-${{ matrix.system }}.iso" \
            >"coder-box-installer-${{ matrix.system }}.iso.sha256")
          ls -lh dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: coder-box-installer-${{ matrix.system }}
          path: dist/coder-box-installer-${{ matrix.system }}.iso*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Determine release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >>"$GITHUB_OUTPUT"
          echo "Releasing tag: $tag"

      - name: Download built ISOs
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lhR dist/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ github.event.inputs.prerelease || false }}
          files: |
            dist/coder-box-installer-x86_64-linux.iso
            dist/coder-box-installer-x86_64-linux.iso.sha256
            dist/coder-box-installer-aarch64-linux.iso
            dist/coder-box-installer-aarch64-linux.iso.sha256
          fail_on_unmatched_files: true
